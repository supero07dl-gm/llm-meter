name: Feature request
description: Suggest a new parser, dashboard feature, or integration
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What observability problem should LLM Meter solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser
        - CLI
        - Dashboard
        - Docker
        - Documentation
        - Alerting
        - Other
